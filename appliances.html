<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoltTrack | Appliance Management</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link rel="stylesheet" href="index.css">
    <link rel="stylesheet" href="appliances.css">
</head>

<body>
    <div class="app-container">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <div class="logo">
                <i class="ph-fill ph-lightning"></i>
            </div>
            <nav class="nav-menu">
                <a href="index.html" class="nav-item" title="Dashboard">
                    <i class="ph-bold ph-squares-four"></i>
                </a>
                <a href="appliances.html" class="nav-item active" title="Appliances">
                    <i class="ph-bold ph-fan"></i>
                </a>
                <a href="analytics.html" class="nav-item" title="Analytics">
                    <i class="ph-bold ph-chart-line-up"></i>
                </a>
                <a href="budget.html" class="nav-item" title="Budget">
                    <i class="ph-bold ph-wallet"></i>
                </a>
            </nav>
            <div class="nav-bottom">
                <a href="settings.html" class="nav-item" title="Settings">
                    <i class="ph-bold ph-gear"></i>
                </a>
                <button id="theme-toggle" class="theme-toggle" title="Toggle Theme">
                    <i class="ph-bold ph-moon" id="theme-icon"></i>
                </button>
                <div class="privacy-note" title="Local Data Encryption Enabled">
                    <i class="ph-bold ph-shield-check"></i>
                </div>
            </div>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <!-- Header -->
            <header class="top-header">
                <div class="header-stats">
                    <div class="stat-pill">
                        <span class="label">Connected:</span>
                        <span class="value">---</span>
                    </div>
                    <div class="stat-pill">
                        <span class="label">Status:</span>
                        <span class="value">---</span>
                    </div>
                </div>
                <div class="header-actions">
                    <div class="search-bar">
                        <i class="ph-bold ph-magnifying-glass"></i>
                        <input type="text" placeholder="Search appliances...">
                    </div>
                    <div class="user-profile">
                        <div class="avatar">
                            <img src="https://ui-avatars.com/api/?name=User&background=FF9F40&color=fff" alt="User">
                        </div>
                    </div>
                </div>
            </header>

            <section class="appliances-view">
                <div class="view-title">
                    <div>
                        <h1>Manage Appliances</h1>
                        <p>Total monthly estimate: ₹0.00</p>
                    </div>
                </div>

                <div class="appliances-grid" id="appliancesGrid">
                    <!-- Dynamic Appliance Cards will be injected here -->
                    <div class="empty-state" style="grid-column: 1/-1; padding: 50px; text-align: center; color: var(--text-secondary);">
                        Initializing appliances...
                    </div>
                </div>
            </section>
        </main>
    </div>
    <script src="billAnalyzer.js"></script>
    <script src="appliances.js"></script>
</body>

</html>
